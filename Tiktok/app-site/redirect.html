<!doctype html><html lang="vi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>TikTok Auth Redirect</title><link rel="stylesheet" href="./styles.css"></head><body><main><section class="card"><div class="pill">OAuth Redirect</div><h1>TikTok authorization callback</h1><p class="muted">Trang này có thể dùng làm redirect URI tạm thời khi cần nhận <code>code</code> từ TikTok OAuth.</p><p id="status">Đang đọc query parameters...</p><pre id="dump" class="small mono"></pre></section><div class="footer small"><a href="./index.html">← Back to app info</a></div></main><script>const params=new URLSearchParams(location.search);const data=Object.fromEntries(params.entries());document.getElementById('dump').textContent=JSON.stringify(data,null,2)||'{}';document.getElementById('status').textContent=data.code?'Đã nhận auth code. Bạn có thể copy giá trị code này để đổi token.':'Chưa có auth code trong URL.';</script></body></html>
